name: Label syncer
on:
  workflow_dispatch:   # manual trigger only - auto-CI disabled per personal policy (Brian44913 fork)
  # push:
  #   paths:
  #     - '.github/labels.yml'
  #   branches:
  #     - main
jobs:
  build:
    name: Sync labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: micnncim/action-label-syncer@v1.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
